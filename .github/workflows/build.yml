name: Build JS

on:
  push:
    branches: [main]
    paths:
      - 'js/src/**'
      - 'js/admin.js'
      - 'js/webpack.config.js'
      - 'js/package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: js
        run: npm install

      - name: Build
        working-directory: js
        run: npm run build

      - name: Commit dist
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: rebuild dist'
          file_pattern: 'js/dist/**'
