format_version: 1

project:
  name: OG Image for Flarum
  slug: ernestdefoe-og-image
  web: https://github.com/ernestdefoe/og-image

components:
  - name: OG Image
    slug: og-image
    vcs: github
    repo: https://github.com/ernestdefoe/og-image
    push: git@github.com:ernestdefoe/og-image.git
    branch: main
    filemask: locale/*.yml
    template: locale/en.yml
    new_base: locale/en.yml
    file_format: yaml-nested
    source_language: en
    license: MIT
    push_on_commit: true
    commit_pending_age: 24
